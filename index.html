<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carré VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        /* Image de fond */
        .bg-img {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('IMG_6840.png');
            background-size: cover;
            background-position: center;
            z-index: 1; /* Derrière */
        }

        /* Voile sombre pour le contraste */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.8) 100%);
            z-index: 2; /* Au-dessus de l'image */
        }

        /* Conteneur du bouton */
        .button-container {
            position: fixed;
            bottom: 40px; /* À 40px du bas */
            left: 50%;
            transform: translateX(-50%); /* Centrage horizontal parfait */
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 999; /* Au-dessus de TOUT */
        }

        .menu-btn {
            background: linear-gradient(45deg, #d4af37, #f9e27d);
            color: #000;
            border: none;
            padding: 22px 0;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 50px;
            width: 80%;
            max-width: 320px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.8);
            cursor: pointer;
            letter-spacing: 1px;
        }

        .menu-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <div class="bg-img"></div>
    <div class="overlay"></div>

    <div class="button-container">
        <button class="menu-btn" onclick="openMenu()">Entrer dans le Carré</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function openMenu() {
            tg.sendData("open_menu");
            tg.close();
        }
    </script>
</body>
</html>
