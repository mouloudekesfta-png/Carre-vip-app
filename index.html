<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carré VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* On utilise le nom exact de ton fichier sur GitHub */
            background-image: url('IMG_6840.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.8));
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            height: 100vh;
            padding-bottom: 60px;
        }

        .menu-btn {
            background: linear-gradient(45deg, #d4af37, #f9e27d);
            color: #000;
            border: none;
            padding: 20px 0;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            width: 85%;
            max-width: 350px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="background-container"></div>
    <div class="overlay"></div>

    <div class="content">
        <button class="menu-btn" onclick="openMenu()">Accéder au Menu</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#000000');

        function openMenu() {
            tg.sendData("open_menu");
            // Optionnel : tu peux ajouter un petit délai avant de fermer
            setTimeout(() => { tg.close(); }, 100);
        }
    </script>
</body>
</html>
