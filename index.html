<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carré VIP - Accès</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Image d'arrière-plan */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -100;
            background-image: url('IMG_6840.png');
            background-size: cover;
            background-position: center;
        }

        /* Overlay sombre pour faire ressortir le bouton */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 100%);
            z-index: -1;
        }

        /* Conteneur du bouton */
        .content {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            height: 100%;
            padding-bottom: 60px; 
        }

        /* Bouton Menu Premium */
        .menu-btn {
            background: linear-gradient(45deg, #d4af37, #f9e27d);
            color: #000;
            border: none;
            padding: 20px 0;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 50px;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: transform 0.2s;
            width: 85%;
            max-width: 320px;
        }

        .menu-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>
    <div class="overlay"></div>

    <div class="content">
        <button class="menu-btn" onclick="openMenu()">Accéder au Menu</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        tg.setHeaderColor('#000000');
        tg.setBackgroundColor('#000000');

        function openMenu() {
            // Envoie l'info au bot et ferme la mini app
            tg.sendData("open_menu");
            tg.close();
        }
    </script>
</body>
</html>
