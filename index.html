<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carré VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0c0c0c; /* Couleur de secours si l'image ne charge pas */
            overflow: hidden;
            font-family: sans-serif;
        }

        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('IMG_6840.png');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Assombrit un peu l'image */
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            height: 100vh;
            padding-bottom: 80px;
        }

        .menu-btn {
            background: linear-gradient(45deg, #d4af37, #f9e27d);
            color: #000;
            border: none;
            padding: 20px;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 50px;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="bg"></div>
    <div class="overlay"></div>

    <div class="content">
        <button class="menu-btn" onclick="openMenu()">Accéder au Menu</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function openMenu() {
            tg.sendData("open_menu");
            tg.close();
        }
    </script>
</body>
</html>
