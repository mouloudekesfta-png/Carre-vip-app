<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CARRÉ VIP - Premium Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --gold: #d4af37;
            --purple: #8a2be2;
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #050505;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* --- PAGE ACCUEIL --- */
        #home-page {
            position: fixed; width: 100%; height: 100%;
            background: url('IMG_6840.png') center/cover no-repeat;
            display: flex; flex-direction: column;
            justify-content: flex-end; align-items: center;
            z-index: 100; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .enter-btn {
            position: relative; z-index: 101;
            background: linear-gradient(45deg, var(--gold), #f9e27d);
            color: #000; border: none; padding: 22px 0; width: 85%;
            border-radius: 50px; font-weight: 900; text-transform: uppercase;
            margin-bottom: 60px; box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        /* --- PAGE SHOP --- */
        #menu-page {
            display: none; padding: 20px 15px;
            background: radial-gradient(circle at top right, #1a0b2e, #050505);
            min-height: 100vh;
        }

        .shop-header h1 { color: var(--gold); text-align: center; letter-spacing: 4px; margin-bottom: 30px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding-bottom: 100px; }

        .card {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 20px; overflow: hidden; backdrop-filter: blur(10px);
        }

        .card-img { width: 100%; height: 130px; background-size: cover; background-position: center; }

        .card-body { padding: 12px; }
        .card-tag { background: var(--purple); font-size: 9px; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        .card-title { font-size: 15px; font-weight: 700; margin: 10px 0 5px 0; }
        .card-price { color: var(--gold); font-weight: 800; font-size: 14px; }

        /* --- MODALE PRODUIT --- */
        #product-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; backdrop-filter: blur(15px);
            overflow-y: auto;
        }

        .modal-content {
            padding: 20px; display: flex; flex-direction: column; align-items: center;
            padding-bottom: 50px;
        }

        .modal-img { width: 100%; height: 250px; border-radius: 20px; background-size: cover; margin-bottom: 20px; border: 1px solid var(--glass-border); }

        .modal-desc { color: #ccc; text-align: left; width: 100%; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }

        .variant-select {
            background: #111; color: white; border: 1px solid var(--glass-border);
            width: 100%; padding: 15px; border-radius: 12px; margin-top: 20px; font-size: 16px;
        }

        .close-modal { position: sticky; top: 0; padding: 20px; background: rgba(0,0,0,0.5); width: 100%; color: var(--gold); font-weight: bold; z-index: 2001; cursor: pointer; }

        /* --- NAV BAS --- */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(5,5,5,0.9); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--glass-border); z-index: 1000; }
        .nav-item { font-size: 11px; color: #555; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

    <div id="home-page">
        <button class="enter-btn" onclick="openShop()">Entrer dans le Carré</button>
    </div>

    <div id="menu-page">
        <div class="shop-header"><h1>CARRÉ VIP</h1></div>
        <div class="grid" id="main-grid"></div>
        <div class="nav-bar">
            <div class="nav-item active">BOUTIQUE</div>
            <div class="nav-item">AVIS</div>
            <div class="nav-item">INFOS</div>
            <div class="nav-item">PANIER</div>
        </div>
    </div>

    <div id="product-modal">
        <div class="close-modal" onclick="closeModal()">✕ RETOUR</div>
        <div class="modal-content" id="modal-body"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const products = [
            {
                id: 1, 
                name: "Beuh Bleu Éléphant 🐘", 
                tag: "Espagne 🇪🇸", 
                img: "IMG_6840.png",
                basePrice: "10€",
                desc: "Indica dominante\nGénétique : issue de Blue Dream × Elephant Bud\nOrigine : Espagne\n\nEffets :\n• Relaxation physique profonde (effet stone)\n• Sensation d'euphorie et de calme\n• Peut garder une légère clarté mentale au début\n• Stimule l'appétit",
                variants: ["1,2g - 10€", "2,5g - 20€"]
            },
            {
                id: 2, 
                name: "Super Mousseux 🇲🇦", 
                tag: "Mousse 🧀", 
                img: "IMG_6840.png",
                basePrice: "10€",
                desc: "Le jaune mousseux sucré par excellence.\nOrigine : Provence Maroc\n\nEffets :\n• Détente corporelle intense\n• Goût sucré et onctueux en bouche\n• Idéal pour les fumeurs réguliers cherchant un bon rapport qualité/prix.",
                variants: ["2,2g - 10€", "4,5g - 20€", "10g - 40€", "25g - 90€", "50g - 150€", "100g - 240€"]
            },
            {
                id: 3, 
                name: "Static Forbidden 🇲🇦", 
                tag: "Static 💎", 
                img: "IMG_6840.png",
                basePrice: "10€",
                desc: "Haut de gamme - Filtration à froid.\nQualité supérieure filtrée pour une pureté maximale.\n\nEffets :\n• Puissance extrême dès les premières taffes\n• Arôme complexe et raffiné\n• Effet longue durée.",
                variants: ["1g - 10€", "2,2g - 20€", "6g - 50€", "10g - 80€", "25g - 160€"]
            }
        ];

        function loadProducts() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = "";
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-img" style="background-image: url('${p.img}')"></div>
                        <div class="card-body">
                            <span class="card-tag">${p.tag}</span>
                            <div class="card-title">${p.name}</div>
                            <div class="card-price">À partir de ${p.basePrice}</div>
                            <button class="buy-btn" onclick="openProduct(${p.id})">Voir produit</button>
                        </div>
                    </div>`;
            });
        }

        function openProduct(id) {
            const p = products.find(item => item.id === id);
            const modalBody = document.getElementById('modal-body');
            let options = p.variants.map(v => `<option value="${v}">${v}</option>`).join('');
            
            modalBody.innerHTML = `
                <div class="modal-img" style="background-image: url('${p.img}')"></div>
                <h2 style="color:var(--gold); margin-bottom:10px;">${p.name}</h2>
                <div class="modal-desc">${p.desc}</div>
                <select class="variant-select" id="selected-variant">
                    <option disabled selected>Choisissez votre quantité</option>
                    ${options}
                </select>
                <button class="enter-btn" style="margin-top:30px; width:100%" onclick="addToCart('${p.name}')">Ajouter au panier</button>
            `;
            document.getElementById('product-modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('product-modal').style.display = 'none'; }

        function openShop() {
            document.getElementById('home-page').style.transform = 'translateY(-100%)';
            setTimeout(() => {
                document.getElementById('home-page').style.display = 'none';
                document.getElementById('menu-page').style.display = 'block';
                loadProducts();
            }, 600);
        }

        function addToCart(name) {
            const variant = document.getElementById('selected-variant').value;
            if(variant === "Choisissez votre quantité") {
                tg.showAlert("Veuillez sélectionner une quantité.");
                return;
            }
            tg.sendData("Commande: " + name + " (" + variant + ")");
            tg.showConfirm("Ajouter " + name + " (" + variant + ") au panier ?", (ok) => {
                if(ok) closeModal();
            });
        }
    </script>
</body>
</html>
